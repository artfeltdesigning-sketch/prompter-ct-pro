<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PROMPTER CT PRO STUDIO V6</title>
<style>
*{box-sizing:border-box}body{margin:0;font-family:Inter,-apple-system,BlinkMacSystemFont,sans-serif;background:#0a0f1c;color:#fff}button,input,select,textarea{font:inherit} .app{display:grid;grid-template-columns:260px 1fr 420px;height:100vh;gap:16px;padding:16px}.panel{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);backdrop-filter:blur(18px);border-radius:22px}.sidebar{padding:20px}.brand{font-size:24px;font-weight:700}.muted{color:rgba(255,255,255,.55);font-size:13px}.nav{margin-top:20px;display:flex;flex-direction:column;gap:8px}.nav button{padding:12px 14px;border:none;border-radius:14px;background:rgba(255,255,255,.06);color:#fff;text-align:left;cursor:pointer}.workspace{padding:20px;overflow:auto}.right{padding:20px;display:flex;flex-direction:column;gap:14px}.card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);border-radius:18px;padding:16px;margin-bottom:14px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.field{display:flex;flex-direction:column;gap:8px}.field label{font-size:12px;color:#cbd5e1}.select,input,textarea{width:100%;padding:14px;border:none;border-radius:14px;background:#182234;color:#fff}.textarea{min-height:140px}.chips{display:flex;flex-wrap:wrap;gap:8px}.chip{padding:10px 14px;border-radius:999px;background:#182234;cursor:pointer;transition:.2s}.chip.active{background:#fff;color:#000}.drop{border:2px dashed rgba(255,255,255,.15);padding:18px;border-radius:16px;text-align:center}.preview img{max-width:90px;border-radius:12px;margin:6px}.actions{display:grid;grid-template-columns:1fr 1fr;gap:10px}.btn{padding:14px;border:none;border-radius:14px;background:#fff;color:#000;font-weight:700;cursor:pointer}.output{flex:1;min-height:300px}.hidden{display:none}@media(max-width:1200px){.app{grid-template-columns:1fr;height:auto}.right{min-height:700px}}
</style>
</head>
<body>
<div class="app">
  <div class="panel sidebar">
    <div class="brand">PROMPTER CT PRO</div>
    <div class="muted">Studio V6 Cinematic Director</div>
    <div class="nav">
      <button>Prompt Builder</button><button>Presets</button><button>AI Models</button><button>Reference Director</button><button>Motion Engine</button><button>Transformation Lab</button><button>Export</button><button>Settings</button>
    </div>
  </div>

  <div class="panel workspace">
    <div class="card grid">
      <div class="field"><label>AI MODEL</label><select id="model" class="select"></select></div>
      <div class="field"><label>MODE</label><select id="mode" class="select"></select></div>
    </div>

    <div class="card">
      <div class="field"><label>DIRECTOR CONTEXT / SUBJECT</label><select id="subject" class="select"></select></div>
      <div class="field" style="margin-top:12px"><label>CUSTOM INSTRUCTION (messy English allowed)</label><textarea id="instruction" class="select textarea" placeholder="same house but luxury sunset and indian security guard at gate"></textarea></div>
    </div>

    <div class="card">
      <div class="field"><label>REFERENCE DIRECTOR</label></div>
      <div class="grid">
        <div class="drop"><input type="file" id="refImage" accept="image/*"></div>
        <div class="field"><label>REFERENCE CONTROL</label><select id="refMode" class="select"></select></div>
      </div>
      <div class="preview" id="preview"></div>
    </div>

    <div class="card"><div class="field"><label>CAMERA DIRECTOR</label><div class="chips" id="cameraChips"></div></div></div>
    <div class="card grid">
      <div class="field"><label>LIGHTING</label><select id="lighting" class="select"></select></div>
      <div class="field"><label>COLOR GRADING</label><select id="grading" class="select"></select></div>
    </div>
    <div class="card"><div class="field"><label>ENVIRONMENT FX</label><div class="chips" id="fxChips"></div></div></div>

    <div class="card hidden" id="motionWrap">
      <div class="grid">
        <div class="field"><label>DURATION</label><select id="duration" class="select"></select></div>
        <div class="field"><label>MOTION STYLE</label><select id="motionStyle" class="select"></select></div>
      </div>
    </div>
  </div>

  <div class="panel right">
    <div class="card grid">
      <div class="field"><label>QUALITY</label><select id="quality" class="select"></select></div>
      <div class="field"><label>PRESET PACK</label><select id="preset" class="select"></select></div>
    </div>
    <textarea id="output" class="select output"></textarea>
    <div class="actions">
      <button class="btn" onclick="generatePrompt()">Generate</button>
      <button class="btn" onclick="navigator.clipboard.writeText(output.value)">Copy</button>
      <button class="btn" onclick="output.value=''">Clear</button>
      <button class="btn" onclick="downloadTxt()">Export TXT</button>
    </div>
  </div>
</div>
<script>
const DATA={model:['Google Nano Banana 2','Google Pro','Kling','Veo','Runway','Sora'],mode:['Image','Motion','Transformation'],quality:['Fast','Premium','Hollywood','Ultra Realism'],preset:['Luxury Real Estate','Action Trailer','Bollywood Poster','Product Commercial'],subject:['Luxury Villa','Security Gate Scene','Supercar Reveal','Mythological Hero'],refMode:['Composition Reference','Lighting Reference','Style Reference','Character Reference'],lighting:['Morning Golden Sunlight','Sunset Orange','Blue Hour','Moonlight Cinematic','Volumetric God Rays'],grading:['Hollywood Blockbuster','Netflix Cinematic','Warm Luxury','Realistic Natural'],duration:['3 sec','5 sec','8 sec'],motionStyle:['Buttery Smooth','Commercial Smooth','Slow Reveal'],cams:['Hero Shot','Low Angle','Drone','Orbit','Dolly In','Tracking','Close Up','Top Shot'],fx:['Volumetric Fog','Dust Particles','Light Rays','Smoke','Rain']};
for (const k in DATA){const el=document.getElementById(k); if(el && el.tagName==='SELECT') DATA[k].forEach(v=>el.add(new Option(v,v)));}
function chips(id,arr){const wrap=document.getElementById(id);arr.forEach(v=>{const d=document.createElement('div');d.className='chip';d.textContent=v;d.onclick=()=>d.classList.toggle('active');wrap.appendChild(d);});}
chips('cameraChips',DATA.cams); chips('fxChips',DATA.fx);
function selected(id, fallback){const vals=[...document.querySelectorAll('#'+id+' .active')].map(x=>x.textContent); return vals.length?vals.join(', '):fallback;}
function cleanInstruction(t){return (t||'').replace(/\bhous\b/ig,'house').replace(/\bgard\b/ig,'guard').replace(/\bmoer\b/ig,'more');}
mode.onchange=()=>motionWrap.classList.toggle('hidden',mode.value==='Image');
refImage.onchange=e=>{preview.innerHTML=''; if(e.target.files[0]){const r=new FileReader(); r.onload=x=>{const img=document.createElement('img'); img.src=x.target.result; preview.appendChild(img)}; r.readAsDataURL(e.target.files[0]);}};
function generatePrompt(){const inst=cleanInstruction(instruction.value)||'no extra custom direction'; output.value=`FINAL READY PROMPT ONLY:\nHigh fidelity prompt optimized for ${model.value}, ${quality.value} cinematic output, ultra realistic 8K HDR, Hollywood production quality, premium cinematic composition, realistic shadows, volumetric lighting, zero cheap AI artifacts. Subject: ${subject.value}. Preserve ${refMode.value.toLowerCase()} from uploaded reference image if provided. Camera: ${selected('cameraChips','auto cinematic professional selection')}. Lighting: ${lighting.value}. Color grading: ${grading.value}. Environmental FX: ${selected('fxChips','subtle cinematic atmosphere')}. ${mode.value!=='Image'?'Motion: '+duration.value+', '+motionStyle.value+'. ':''}Custom instruction professionally interpreted: ${inst}.`;}
function downloadTxt(){const blob=new Blob([output.value],{type:'text/plain'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='prompt.txt'; a.click();}
generatePrompt();
</script>
</body>
</html>
