<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PROMPTER CT PRO</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #0a0a0a, #111827);
    color: white;
    min-height: 100vh;
    padding: 20px;
}

.container {
    max-width: 1500px;
    margin: auto;
    display: grid;
    grid-template-columns: 2fr 1fr;
    gap: 20px;
}

.card {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 24px;
    padding: 24px;
    backdrop-filter: blur(12px);
}

h1 {
    font-size: 38px;
    margin-bottom: 20px;
}

h2 {
    margin-bottom: 15px;
}

h3 {
    margin: 18px 0 10px;
    font-size: 15px;
    color: #d1d5db;
}

select, input, textarea {
    width: 100%;
    padding: 14px;
    border-radius: 14px;
    border: none;
    background: #1f2937;
    color: white;
    font-size: 14px;
}

textarea {
    min-height: 650px;
    resize: vertical;
}

button {
    width: 100%;
    padding: 15px;
    border: none;
    border-radius: 14px;
    font-weight: bold;
    cursor: pointer;
    margin-top: 14px;
    transition: 0.3s;
}

.primary {
    background: white;
    color: black;
}

.primary:hover {
    transform: scale(1.02);
}

.grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 15px;
}

@media (max-width: 900px) {
    .container {
        grid-template-columns: 1fr;
    }

    .grid {
        grid-template-columns: 1fr;
    }
}
</style>
</head>

<body>

<div class="container">

    <div class="card">
        <h1>PROMPTER CT PRO</h1>

        <div class="grid">
            <div>
                <h3>AI MODEL</h3>
                <select id="model">
                    <option>Kling</option>
                    <option>Veo</option>
                    <option>Runway</option>
                    <option>Sora</option>
                    <option>Midjourney</option>
                    <option>Flux</option>
                    <option>Leonardo</option>
                </select>
            </div>

            <div>
                <h3>MODE</h3>
                <select id="mode">
                    <option>Image</option>
                    <option>Motion</option>
                    <option>Transformation</option>
                    <option>Commercial Ad</option>
                    <option>Luxury Interior</option>
                    <option>Architecture</option>
                    <option>Logo Animation</option>
                </select>
            </div>
        </div>

        <h3>SUBJECT / SCENE</h3>
        <input id="subject" value="Luxury cinematic subject">

        <h3>CAMERA ANGLES / MOVEMENT</h3>
        <input id="camera" value="Hero Shot, Dolly In, Orbit">

        <h3>LIGHTING</h3>
        <input id="lighting" value="Morning Golden Sunlight, Volumetric God Rays">

        <h3>COLOR GRADING</h3>
        <input id="grading" value="Hollywood Blockbuster">

        <h3>ENVIRONMENT FX</h3>
        <input id="fx" value="Fog, Dust Particles, Light Rays">

        <div class="grid">
            <div>
                <h3>DURATION</h3>
                <input id="duration" value="5 sec">
            </div>

            <div>
                <h3>ASPECT RATIO</h3>
                <select id="ratio">
                    <option>9:16</option>
                    <option>16:9</option>
                    <option>1:1</option>
                    <option>4:5</option>
                    <option>21:9</option>
                </select>
            </div>
        </div>

        <h3>NEGATIVE PROMPT</h3>
        <input id="negative" value="blurry, low quality, distorted anatomy, cheap AI artifacts, jitter">

        <button class="primary" onclick="generatePrompt()">GENERATE PROMPT</button>
    </div>

    <div class="card">
        <h2>FINAL PROMPT</h2>
        <textarea id="output"></textarea>
        <button class="primary" onclick="copyPrompt()">COPY PROMPT</button>
    </div>

</div>

<script>
function get(id) {
    return document.getElementById(id).value;
}

function generatePrompt() {
    let mode = get("mode");

    let motionText = "";
    if (mode !== "Image") {
        motionText = "buttery smooth cinematic motion, realistic physics, motion blur, stable professional camera movement, natural acceleration, ";
    }

    let transformText = "";
    if (mode === "Transformation" || mode === "Logo Animation") {
        transformText = "Hollywood VFX transformation, realistic morphing, seamless frame continuity, ";
    }

    let prompt =
`AI MODEL: ${get("model")}
MODE: ${mode}
ASPECT RATIO: ${get("ratio")}
DURATION: ${get("duration")}

FINAL READY PROMPT:

Ultra realistic, 8K HDR cinematic quality, hyper detailed, Hollywood blockbuster visual style, premium composition, depth of field, realistic reflections, volumetric lighting, ${motionText}${transformText}
SUBJECT: ${get("subject")}
CAMERA: ${get("camera")}
LIGHTING: ${get("lighting")}
COLOR GRADING: ${get("grading")}
FX: ${get("fx")}
NEGATIVE: ${get("negative")}`;

    document.getElementById("output").value = prompt;
}

function copyPrompt() {
    navigator.clipboard.writeText(document.getElementById("output").value);
    alert("Prompt copied!");
}

generatePrompt();
</script>

</body>
</html>
